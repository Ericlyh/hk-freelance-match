    date: 2026-03-20
    topic: Q3 & Q4 Answers
    summary: "Cantonese-first (zh-HK locale). Predefined categories (Photography, Videography, Graphic Design, Social Media, Copywriting, Event Planning, Web Dev, Branding)"
    owner: ethan


    topic: Tech Stack & Architecture
    summary: "Next.js 14 + TypeScript + Supabase + Stripe Connect + Vercel. Monolith (serverless). PWA for mobile."
    details: "Full recommendation in ARCHITECTURE.md. Key: Stripe Connect for HK escrow, Supabase for auth/DB/storage/realtime, next-intl for zh-HK/en i18n."
    owner: pm-hk-freelance-match

